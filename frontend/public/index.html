<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RestaurantOS — Commission Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0f1117; color: #e8e8e8; font-family: 'Outfit', sans-serif; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #1a1d27; }
      ::-webkit-scrollbar-thumb { background: #3a3f5c; border-radius: 3px; }
      input, select, textarea { font-family: 'Outfit', sans-serif; }
      input[type="date"], input[type="month"] { color-scheme: dark; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
